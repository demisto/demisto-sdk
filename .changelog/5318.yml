changes:
- description: Added support for the new **Connector** content item, so connectors
    are recognized and handled by the SDK like any other content type.
  type: feature
- description: Added validations for Connector content items, catching common issues
    in connector definitions early — before they reach the platform.
  type: feature
- description: Added support for updating the content graph with Connector items,
    so connectors are included in graph builds and updates alongside other content.
  type: feature
pr_number: 5318
